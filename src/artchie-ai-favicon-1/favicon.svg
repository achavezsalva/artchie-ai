<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0b10" />
      <stop offset="100%" stop-color="#141525" />
    </linearGradient>
    
    <!-- Outer Glow Gradient -->
    <linearGradient id="ringGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ec4899" />
      <stop offset="50%" stop-color="#f43f5e" />
      <stop offset="100%" stop-color="#fbbf24" />
    </linearGradient>

    <!-- Star Glow -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- Outer Gradient Ring -->
  <circle cx="256" cy="256" r="240" fill="none" stroke="url(#ringGrad)" stroke-width="12" />

  <!-- Main Background Circle -->
  <circle cx="256" cy="256" r="228" fill="url(#bgGrad)" />

  <!-- Waving Hand Mascot -->
  <g transform="translate(0, -20)">
    <!-- Blue wave lines on left/back -->
    <path d="M 180 200 A 45 45 0 0 1 180 260" fill="none" stroke="#60a5fa" stroke-width="8" stroke-linecap="round" opacity="0.6" />
    <path d="M 160 180 A 70 70 0 0 1 160 280" fill="none" stroke="#3b82f6" stroke-width="6" stroke-linecap="round" opacity="0.4" />

    <!-- Center Mascot (Waving Hand Emoji Emoji-Style vector rendering) -->
    <text x="256" y="240" font-family="system-ui, -apple-system, sans-serif" font-size="160" text-anchor="middle" dominant-baseline="central">👋</text>
  </g>

  <!-- Sparkles / Star Elements below -->
  <g filter="url(#glow)">
    <!-- Big Star -->
    <path d="M 256 310 C 256 340 270 354 300 354 C 270 354 256 368 256 398 C 256 368 242 354 212 354 C 242 354 256 340 256 310 Z" fill="#fde047" />
    <!-- Small Left Star -->
    <path d="M 190 350 C 190 365 197 372 212 372 C 197 372 190 379 190 394 C 190 379 183 372 168 372 C 183 372 190 365 190 350 Z" fill="#fef08a" />
  </g>
</svg>
